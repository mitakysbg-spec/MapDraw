<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="canvas-container">
        <canvas id="pixelCanvas" width="1000" height="1000"></canvas>
    </div>

    <div id="ui-container">
        <button id="center-btn">🎯 Центрирай</button>
        <button id="eraser-btn">🧽 Гума</button>
        <button id="theme-btn">🌓 Тема</button>
        
        <div id="timer">Готов за рисуване!</div>
        <div id="palette"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="script.js"></script>

</body>
</html>
